<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        :root { --bg: #0f111a; --card: #1a1c29; --text: #ffffff; --accent: linear-gradient(90deg, #60a5fa, #c084fc); --glow: 0 0 15px rgba(99, 102, 241, 0.6); }
        .light-mode { --bg: #f3f4f6; --card: #ffffff; --text: #1f2937; }
        
        body { margin: 0; background: var(--bg); color: var(--text); font-family: sans-serif; height: 100vh; display: flex; justify-content: center; align-items: center; transition: 0.3s; }
        
        .login-card { background: var(--card); padding: 50px; border-radius: 20px; border: 1px solid #4f46e5; box-shadow: var(--glow); text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: none; background: #25283d; color: white; }
        
        #dashboard { display: none; width: 95vw; height: 90vh; background: var(--card); border-radius: 20px; padding: 30px; box-shadow: var(--glow); overflow-y: auto; }
        .gradient-text { background: var(--accent); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 2.5rem; }
        
        .btn { background: var(--accent); border: none; padding: 10px 20px; border-radius: 30px; color: white; cursor: pointer; font-weight: bold; margin: 5px; }
        .drop-zone { border: 2px dashed #6366f1; height: 120px; display: flex; align-items: center; justify-content: center; border-radius: 20px; margin: 20px 0; }
        .doc-card { display: flex; align-items: center; justify-content: space-between; background: #25283d; padding: 15px; border-radius: 10px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="login" class="login-card">
        <h2>Welcome Back</h2>
        <input type="text" id="u" placeholder="Username">
        <input type="password" id="p" placeholder="Password">
        <button class="btn" onclick="auth()">Unlock Dashboard</button>
    </div>

    <div id="dashboard">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h1 class="gradient-text">Jayant's 🏫 School Vault ✨</h1>
            <button class="btn" onclick="document.body.classList.toggle('light-mode')">🌓 Toggle Mode</button>
        </div>

        <div class="drop-zone">
            <input type="file" id="fileIn" style="display:none" onchange="uploadFile(this.files[0])">
            <button class="btn" onclick="document.getElementById('fileIn').click()">+ Add Document</button>
        </div>

        <h3>RECENT DOCUMENTS</h3>
        <div id="vault"></div>
    </div>

    <script>
        function auth() {
            if(document.getElementById('u').value === 'christschoolcbse' && document.getElementById('p').value === '1310') {
                document.getElementById('login').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
            } else { alert('Invalid Credentials'); }
        }

        function uploadFile(file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const vault = document.getElementById('vault');
                const div = document.createElement('div');
                div.className = 'doc-card';
                div.innerHTML = `
                    <span class="file-name">${file.name}</span>
                    <div>
                        <a href="${e.target.result}" download="${file.name}"><button class="btn">Download</button></a>
                        <button class="btn" onclick="renameFile(this)">✏️</button>
                        <button class="btn" onclick="deleteFile(this)">🗑️</button>
                    </div>
                `;
                vault.appendChild(div);
            };
            reader.readAsDataURL(file);
        }

        function renameFile(btn) {
            const nameSpan = btn.parentElement.parentElement.querySelector('.file-name');
            const newName = prompt("Enter new name:", nameSpan.innerText);
            if (newName) nameSpan.innerText = newName;
        }

        function deleteFile(btn) {
            if (confirm("Are you sure you want to delete this document?")) {
                btn.parentElement.parentElement.remove();
            }
        }
    </script>
</body>
</html>
