<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        :root { --bg: #0f111a; --card: #1a1c29; --accent: linear-gradient(90deg, #60a5fa, #c084fc); --glow: 0 0 15px rgba(99, 102, 241, 0.6); }
        body { margin: 0; background: var(--bg); color: white; font-family: sans-serif; height: 100vh; display: flex; justify-content: center; align-items: center; }

        /* Login Layout */
        #login-overlay { background: var(--card); padding: 50px 80px; border-radius: 20px; border: 1px solid #4f46e5; box-shadow: var(--glow); text-align: center; }
        input { margin: 15px 0; padding: 12px 20px; width: 250px; display: block; border-radius: 25px; border: 1px solid #333; background: #25283d; color: white; }
        .unlock-btn { background: var(--accent); border: none; padding: 12px 40px; border-radius: 25px; color: white; cursor: pointer; font-weight: bold; }

        /* Dashboard Layout */
        #dashboard { display: none; width: 95vw; height: 90vh; background: var(--card); border-radius: 20px; padding: 30px; box-shadow: var(--glow); position: relative; }
        .add-zone { border: 2px dashed #4f46e5; height: 150px; display: flex; align-items: center; justify-content: center; border-radius: 20px; margin: 20px 0; }
        .add-btn { background: var(--accent); border: none; padding: 10px 25px; border-radius: 20px; color: white; cursor: pointer; font-weight: bold; }
        .doc-item { display: flex; justify-content: space-between; background: #25283d; padding: 15px; border-radius: 10px; margin-top: 10px; }
        .btn { background: var(--accent); border: none; padding: 8px 15px; border-radius: 20px; color: white; cursor: pointer; margin: 2px; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <h2>Login</h2>
        <input type="text" id="u" placeholder="Username">
        <input type="password" id="p" placeholder="Password">
        <button class="unlock-btn" onclick="auth()">Unlock</button>
    </div>

    <div id="dashboard">
        <h1>Jayant's 🏫 School Vault ✨</h1>
        <div class="add-zone">
            <input type="file" id="fileIn" accept="image/*,application/pdf,video/*,.doc,.docx" style="display:none" onchange="processFile(this.files[0])">
            <button class="add-btn" onclick="document.getElementById('fileIn').click()">+ Add Document</button>
        </div>
        <h3>RECENT DOCUMENTS</h3>
        <div id="vault"></div>
    </div>

    <script>
        // LOGIN LOGIC
        function auth() {
            if(document.getElementById('u').value === 'christschoolcbse' && document.getElementById('p').value === '1310') {
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
            } else { alert('Invalid Credentials'); }
        }

        // SAVE AND RELOAD LOGIC
        window.onload = () => {
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                const value = localStorage.getItem(key);
                if (value && value.startsWith('data:')) {
                    renderFile(key, value);
                }
            }
        };

        function processFile(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                localStorage.setItem(file.name, e.target.result);
                renderFile(file.name, e.target.result);
            };
            reader.readAsDataURL(file);
        }

        function renderFile(name, data) {
            const div = document.createElement('div');
            div.className = 'doc-item';
            div.innerHTML = `<span>${name}</span>
                <div>
                    <button class="btn" onclick="viewFile('${name}')">👁️</button>
                    <a href="${data}" download="${name}"><button class="btn">⬇️</button></a>
                    <button class="btn" onclick="rename(this, '${name}')">✏️</button>
                    <button class="btn" onclick="del(this, '${name}')">🗑️</button>
                </div>`;
            document.getElementById('vault').appendChild(div);
        }

        // Fixed Word document processor to unpack internal data streams correctly using Mammoth engine
        function viewFile(name) {
            const data = localStorage.getItem(name);
            if (data) {
                try {
                    const parts = data.split(',');
                    const contentType = parts[0].split(':')[1].split(';')[0];
                    const base64Data = parts[1];
                    
                    const byteCharacters = atob(base64Data);
                    const byteNumbers = new Array(byteCharacters.length);
                    for (let i = 0; i < byteCharacters.length; i++) {
                        byteNumbers[i] = byteCharacters.charCodeAt(i);
                    }
                    const byteArray = new Uint8Array(byteNumbers);
                    
                    const blob = new Blob([byteArray], { type: contentType });
                    const blobUrl = URL.createObjectURL(blob);
                    
                    // Route Word files through Mammoth rendering template
                    if (contentType.includes('msword') || contentType.includes('officedocument.wordprocessingml')) {
                        const newWindow = window.open();
                        if (newWindow) {
                            newWindow.document.write(`
                                <html>
                                <head>
                                    <title>Preview: ${name}</title>
                                    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"><\/script>
                                    <style>
                                        body { background: #0f111a; color: #e2e8f0; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 40px; margin: 0; }
                                        .container { background: #1a1c29; padding: 40px; border-radius: 12px; border: 1px solid #4f46e5; max-width: 800px; width: 100%; box-shadow: 0 0 15px rgba(99, 102, 241, 0.4); }
                                        h2 { margin-top: 0; color: #60a5fa; border-bottom: 1px solid #334155; padding-bottom: 10px; }
                                        .content-view { font-family: sans-serif; font-size: 16px; line-height: 1.6; color: #cbd5e1; background: #11131e; padding: 25px; border-radius: 6px; border: 1px solid #222536; max-height: 70vh; overflow-y: auto; }
                                        .badge { display: inline-block; background: linear-gradient(90deg, #60a5fa, #c084fc); padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; margin-bottom: 15px; color: white; }
                                        p { margin: 0 0 10px 0; }
                                    </style>
                                </head>
                                <body>
                                    <div class="container">
                                        <h2>📝 ${name}</h2>
                                        <div class="badge">Word Document Viewer Panel</div>
                                        <div id="output" class="content-view">Loading readable layout engine...</div>
                                    </div>
                                    <script>
                                        const base64Str = "${base64Data}";
                                        const binaryArr = atob(base64Str);
                                        const len = binaryArr.length;
                                        const bytes = new Uint8Array(len);
                                        for (let i = 0; i < len; i++) {
                                            bytes[i] = binaryArr.charCodeAt(i);
                                        }
                                        
                                        window.onload = () => {
                                            if (window.mammoth) {
                                                window.mammoth.convertToHtml({arrayBuffer: bytes.buffer})
                                                    .then(result => {
                                                        document.getElementById('output').innerHTML = result.value || "<p style='color:#64748b;'>[Empty Document Content]</p>";
                                                    })
                                                    .catch(err => {
                                                        document.getElementById('output').innerText = "Failed to parse underlying document formatting layout.";
                                                    });
                                            } else {
                                                document.getElementById('output').innerText = "Failed to synchronize runtime script libraries.";
                                            }
                                        };
                                    <\/script>
                                </body>
                                </html>
                            `);
                            newWindow.document.close();
                        } else {
                            alert('Pop-up blocked! Please allow pop-ups for this site to view files.');
                        }
                    }
                    // Handle regular Video previews
                    else if (contentType.startsWith('video/')) {
                        const newWindow = window.open();
                        if (newWindow) {
                            newWindow.document.write(`
                                <html>
                                <head><title>${name}</title></head>
                                <body style="margin:0; background:#0f111a; display:flex; justify-content:center; align-items:center; height:100vh; overflow:hidden;">
                                    <video controls autoplay style="max-width:100%; max-height:100%; outline:none;">
                                        <source src="${blobUrl}" type="${contentType}">
                                        Your browser does not support the video tag.
                                    </video>
                                </body>
                                </html>
                            `);
                            newWindow.document.close();
                        } else {
                            alert('Pop-up blocked! Please allow pop-ups for this site to view files.');
                        }
                    } 
                    // Handle default Image and PDF native tab render engine
                    else {
                        const newWindow = window.open(blobUrl, '_blank');
                        if (!newWindow) {
                            alert('Pop-up blocked! Please allow pop-ups for this site to view files.');
                        }
                    }
                } catch (error) {
                    alert('Error preparing file preview. Please try downloading it instead.');
                }
            }
        }

        function rename(btn, oldName) {
            const newName = prompt("Enter new name:", oldName);
            if(newName) {
                const data = localStorage.getItem(oldName);
                localStorage.removeItem(oldName);
                localStorage.setItem(newName, data);
                location.reload();
            }
        }

        function del(btn, name) {
            if(confirm("Delete this document?")) {
                localStorage.removeItem(name);
                btn.parentElement.parentElement.remove();
            }
        }
    </script>
</body>
</html>
